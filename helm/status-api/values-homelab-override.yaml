# Overrides used by ArgoCD in local K3s when layering on top of values-prod.yaml.
replicaCount: 2

env:
  appEnv: "cluster"
  deployEventTokenSecret:
    name: status-api-deploy-event-token
    key: token

serviceMonitor:
  enabled: true
  labels:
    release: observability

rollout:
  trafficRouting:
    provider: none

deployEvent:
  environment: cluster

database:
  localPostgres:
    enabled: true

ingress:
  host: "lab.northlift.net"
  tlsSecretName: "status-api-tls-prod"

resources:
  requests:
    cpu: "100m"
    memory: "64Mi"
  limits:
    cpu: "250m"
    memory: "128Mi"
