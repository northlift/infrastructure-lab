{{- if .Values.database.localPostgres.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-postgres
  labels:
    app: {{ .Chart.Name }}-postgres
    release: {{ .Release.Name }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Chart.Name }}-postgres
    release: {{ .Release.Name }}
  ports:
    - name: postgres
      port: {{ .Values.database.localPostgres.service.port }}
      targetPort: postgres
      protocol: TCP
{{- end }}
