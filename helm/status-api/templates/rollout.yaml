{{- if .Values.rollout.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ .Release.Name }}-rollout
  labels:
    app: {{ .Chart.Name }}
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  progressDeadlineSeconds: {{ .Values.progressDeadlineSeconds }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
        release: {{ .Release.Name }}
    spec:
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{ toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            - name: APP_ENV
              value: {{ .Values.env.appEnv | quote }}
            - name: REDIS_HOST
              value: {{ .Values.env.redisHost | quote }}
            {{- if .Values.database.localPostgres.enabled }}
            - name: DATABASE_URL
              value: {{ printf "postgresql+psycopg://%s:%s@%s-postgres:%v/%s" .Values.database.localPostgres.auth.username .Values.database.localPostgres.auth.password .Release.Name .Values.database.localPostgres.service.port .Values.database.localPostgres.auth.database | quote }}
            {{- else if .Values.env.databaseUrlSecret.name }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.databaseUrlSecret.name | quote }}
                  key: {{ .Values.env.databaseUrlSecret.key | quote }}
                  optional: false
            {{- else if .Values.env.databaseUrl }}
            - name: DATABASE_URL
              value: {{ .Values.env.databaseUrl | quote }}
            {{- end }}
            {{- if .Values.env.deployEventTokenSecret.name }}
            - name: DEPLOY_EVENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.deployEventTokenSecret.name | quote }}
                  key: {{ .Values.env.deployEventTokenSecret.key | quote }}
            {{- end }}
          resources:
            {{ toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            {{ toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{ toYaml .Values.readinessProbe | nindent 12 }}
  strategy:
    canary:
      stableService: {{ .Release.Name }}-service
      canaryService: {{ .Release.Name }}-canary
      maxSurge: {{ .Values.rollout.maxSurge | quote }}
      maxUnavailable: {{ .Values.rollout.maxUnavailable }}
      {{- if eq .Values.rollout.trafficRouting.provider "nginx" }}
      trafficRouting:
        nginx:
          stableIngress: {{ default (printf "%s-ingress" .Release.Name) .Values.rollout.trafficRouting.nginx.stableIngress | quote }}
          annotationPrefix: {{ .Values.rollout.trafficRouting.nginx.annotationPrefix | quote }}
      {{- end }}
      steps:
        {{- toYaml .Values.rollout.canary.steps | nindent 8 }}
{{- end }}
