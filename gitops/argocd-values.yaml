global:
  domain: argocd.northlift.net

configs:
  params:
    server.insecure: true
    timeout.reconciliation: 120s
  cm:
    resource.customizations.health.argoproj.io_Rollout: |
      hs = {}
      if obj.status ~= nil and obj.status.phase ~= nil then
        if obj.status.phase == "Healthy" then
          hs.status = "Healthy"
          hs.message = obj.status.message
          return hs
        end
        if obj.status.phase == "Degraded" then
          hs.status = "Degraded"
          hs.message = obj.status.message
          return hs
        end
        if obj.status.phase == "Paused" then
          hs.status = "Suspended"
          hs.message = obj.status.message
          return hs
        end
        if obj.status.phase == "Progressing" then
          hs.status = "Progressing"
          hs.message = obj.status.message
          return hs
        end
      end
      hs.status = "Progressing"
      hs.message = "Waiting for rollout status"
      return hs

dex:
  enabled: false

notifications:
  enabled: false

controller:
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

repoServer:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

applicationSet:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

redis:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

server:
  ingress:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
