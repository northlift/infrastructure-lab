apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: status-api-cloud
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  source:
    repoURL: https://github.com/northlift/infrastructure-lab.git
    targetRevision: main
    path: helm/status-api
    helm:
      releaseName: status-api-cloud
      valueFiles:
        - values-prod.yaml
        - values-cloud-override.yaml
  destination:
    name: aws-eks-prod
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
