apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/northlift/infrastructure-lab.git
    targetRevision: main
    path: gitops/apps
    # Child Applications in this folder (including sealed-secrets, platform-secrets,
    # and cloudflare-tunnel)
    # are auto-discovered by the App of Apps root.
    directory:
      recurse: false
      exclude: root.yaml
      include: "*.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
