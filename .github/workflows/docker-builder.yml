name: Build & Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: docker-builder-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/upwind1647/status-api

jobs:
  build-test-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')

    permissions:
      contents: read         # checkout only; no write needed for build/test/scan
      packages: write        # necessary to push Docker image to GHCR

    outputs:
      short_sha: ${{ steps.build_image.outputs.short_sha }}
      image_tag: ${{ steps.build_image.outputs.image_tag }}

    steps:
      # Get repository code
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Install dependencies from lockfile
      - name: Install Dependencies
        run: uv sync --frozen

      # Run test suite
      - name: Run Tests
        env:
          APP_ENV: ci
        run: uv run pytest tests/

      # Enforce code style checks
      - name: Run Black (Code Style)
        run: uv run black --check --diff .

      # Build Docker image and tag with SHA
      - name: Build Docker Image
        id: build_image
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          FULL_SHA=$(git rev-parse HEAD)
          COMMITTED_AT=$(git log -1 --format=%cI)
          IMAGE_TAG="${IMAGE_NAME}:${SHORT_SHA}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "committed_at=${COMMITTED_AT}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          docker build \
            --label "org.opencontainers.image.revision=${FULL_SHA}" \
            --label "org.opencontainers.image.created=${COMMITTED_AT}" \
            -t "${IMAGE_TAG}" .

      # Scan the image for vulnerabilities
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.build_image.outputs.image_tag }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # Launch container, check /health endpoint
      - name: Smoke Test
        run: |
          IMAGE_TAG="${{ steps.build_image.outputs.image_tag }}"
          docker run -d --name test-api -p 8000:8000 \
            -e APP_ENV=ci \
            -e DATABASE_URL="sqlite:///:memory:" \
            "${IMAGE_TAG}"

          # Wait up to 20s for healthy response
          for i in $(seq 1 20); do
            if curl -sf --connect-timeout 2 --max-time 5 http://localhost:8000/health > /dev/null 2>&1; then
              echo "Health check passed (attempt ${i}/20)"
              break
            fi
            echo "Attempt ${i}/20 - waiting..."
            sleep 1
          done

          if ! curl -sf --connect-timeout 2 --max-time 5 http://localhost:8000/health > /dev/null 2>&1; then
            echo "Health check failed"
            docker logs test-api || true
            exit 1
          fi

      # Remove test container
      - name: Cleanup Test Container
        if: always()
        run: docker rm -f test-api 2>/dev/null || true

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push "${{ steps.build_image.outputs.image_tag }}"

  update-values:
    runs-on: ubuntu-latest
    needs: build-test-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'

    permissions:
      contents: write        # necessary to commit the values write-back

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Helm
        uses: azure/setup-helm@v4

      - name: Update values-prod image tag
        run: |
          SHORT_SHA="${{ needs.build-test-scan.outputs.short_sha }}"
          yq e '.image.tag = "'"${SHORT_SHA}"'"' -i helm/status-api/values-prod.yaml

      - name: Validate Helm Render
        run: |
          helm template status-api-lab ./helm/status-api \
            -f ./helm/status-api/values-prod.yaml \
            -f ./helm/status-api/values-homelab-override.yaml \
            > /dev/null

      - name: Commit and Push values-prod tag update
        run: |
          SHORT_SHA="${{ needs.build-test-scan.outputs.short_sha }}"
          if git diff --quiet -- helm/status-api/values-prod.yaml; then
            echo "No values change detected; skipping commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add helm/status-api/values-prod.yaml
          git commit -m "ci: update status-api image tag to ${SHORT_SHA} [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
